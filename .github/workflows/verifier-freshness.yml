name: Verifier Freshness

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  freshness:
    name: Programs up to date
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Use the interpreter package (not verifier) so we restore its warm
      # mathlib cache instead of attempting a cold git clone of mathlib for
      # a brand-new package entry. All git packages are pinned at the same
      # revisions in both interpreter/lake-manifest.json and
      # verifier/lake-manifest.json, so we can reuse the artifacts.
      - uses: leanprover/lean-action@v1
        with:
          lake-package-directory: interpreter
          build-args: Interpreter
          use-mathlib-cache: true

      # Copy interpreter's already-resolved git packages into the verifier's
      # packages directory so lake finds them without re-cloning.
      - name: Seed verifier packages from interpreter
        run: cp -r interpreter/.lake/packages verifier/.lake/

      # Build only the verifier executable; packages are already present.
      - name: Build verifier
        run: lake -d verifier build verifier

      # Rust toolchain + wasm32 target for cargo build inside verifier check.
      - name: Install Rust wasm32 target
        run: rustup target add wasm32-unknown-unknown

      # wasm-tools is needed by verifier check (strip + print).
      - name: Install wasm-tools
        uses: taiki-e/install-action@v2
        with:
          tool: wasm-tools

      # Regenerate every Program.lean / module.wat without running lake build
      # (proof correctness is covered by the main CI job).
      - name: Regenerate programs
        run: |
          find programs -name "origin.toml" | while read f; do
            dir=$(dirname "$f")
            echo "==> verifier check --no-build $dir"
            lake -d verifier exe verifier check --no-build "$dir"
          done

      # Fail if any generated file changed.
      - name: Assert no drift
        run: |
          git diff --exit-code -- programs/ \
            || { echo ""; echo "Generated files are out of date. Re-run:"; \
                 echo "  lake -d verifier exe verifier check <program-path>"; \
                 exit 1; }
