name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# The proof build is split into a chain of jobs, each comfortably under
# ~20 minutes, handing off the .lake/build trees via per-sha caches.
# Two reasons: (1) actions/cache only saves when a job *completes*, so a
# single long job that gets killed never seeds its own cache; (2) jobs
# on this org are observed to be force-cancelled at ~24 minutes of
# runtime, so no single job may exceed that.
jobs:
  deps:
    name: Build interpreter + codelib
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/cache@v4
        with:
          path: .lake/packages
          key: lake-pkgs-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('lean-toolchain') }}-${{ hashFiles('interpreter/lake-manifest.json') }}
          restore-keys: |
            lake-pkgs-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('lean-toolchain') }}-
      # Warm-start from the most recent build tree on this toolchain;
      # save under this sha for the downstream jobs.
      - uses: actions/cache@v4
        with:
          path: |
            interpreter/.lake/build
            codelib/.lake/build
            programs/lean/.lake/build
          key: lake-build-deps-${{ runner.os }}-${{ hashFiles('lean-toolchain') }}-${{ github.sha }}
          restore-keys: |
            lake-build-deps-${{ runner.os }}-${{ hashFiles('lean-toolchain') }}-
      - uses: leanprover/lean-action@v1
        with:
          lake-package-directory: codelib
          use-mathlib-cache: true

  itoa:
    name: Build Itoa proofs
    runs-on: ubuntu-latest
    needs: deps
    steps:
      - uses: actions/checkout@v4
      - uses: actions/cache@v4
        with:
          path: .lake/packages
          key: lake-pkgs-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('lean-toolchain') }}-${{ hashFiles('interpreter/lake-manifest.json') }}
          restore-keys: |
            lake-pkgs-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('lean-toolchain') }}-
      - uses: actions/cache/restore@v4
        with:
          path: |
            interpreter/.lake/build
            codelib/.lake/build
            programs/lean/.lake/build
          key: lake-build-deps-${{ runner.os }}-${{ hashFiles('lean-toolchain') }}-${{ github.sha }}
      - uses: actions/cache@v4
        with:
          path: |
            interpreter/.lake/build
            codelib/.lake/build
            programs/lean/.lake/build
          key: lake-build-itoa-${{ runner.os }}-${{ hashFiles('lean-toolchain') }}-${{ github.sha }}
      # Itoa.Proofs elaboration peaks at multiple GB; give the runner swap
      # to absorb it (lake has no flag to limit build parallelism).
      - name: Add swap
        run: |
          sudo fallocate -l 16G /mnt/swapfile
          sudo chmod 600 /mnt/swapfile
          sudo mkswap /mnt/swapfile
          sudo swapon /mnt/swapfile
          free -h
      - uses: leanprover/lean-action@v1
        env:
          # Cap lean's parallel elaboration tasks: each task can hold
          # multi-GB state on the heavyweight proof files, and the
          # default (= nproc) thrashes the runner into swap death.
          LEAN_NUM_THREADS: "2"
        with:
          lake-package-directory: programs/lean
          build-args: Project.Itoa.Proofs
          use-mathlib-cache: true

  build:
    name: Build & verify proofs
    runs-on: ubuntu-latest
    needs: itoa
    steps:
      - uses: actions/checkout@v4
      - uses: actions/cache@v4
        with:
          path: .lake/packages
          key: lake-pkgs-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('lean-toolchain') }}-${{ hashFiles('interpreter/lake-manifest.json') }}
          restore-keys: |
            lake-pkgs-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('lean-toolchain') }}-
      - uses: actions/cache/restore@v4
        with:
          path: |
            interpreter/.lake/build
            codelib/.lake/build
            programs/lean/.lake/build
          key: lake-build-itoa-${{ runner.os }}-${{ hashFiles('lean-toolchain') }}-${{ github.sha }}
      # The remaining heavyweight proof files (ReverseInplace.Spec,
      # RustOption.Spec, XorSum.Spec) also peak at multiple GB.
      - name: Add swap
        run: |
          sudo fallocate -l 16G /mnt/swapfile
          sudo chmod 600 /mnt/swapfile
          sudo mkswap /mnt/swapfile
          sudo swapon /mnt/swapfile
          free -h
      - uses: leanprover/lean-action@v1
        env:
          LEAN_NUM_THREADS: "2"
        with:
          lake-package-directory: programs/lean
          use-mathlib-cache: true
      - name: Fail on build warnings
        working-directory: programs/lean
        run: |
          set -o pipefail
          # Rebuild (cached) and capture output. Warnings (e.g. `sorry`,
          # unused-variable lints) are re-emitted on every build but do not
          # change lake's exit code, so scan the log and fail if any appear.
          lake build 2>&1 | tee build.log
          if grep -E '(^|[[:space:]])warning:' build.log; then
            echo "::error::Build produced warnings; warnings are not allowed."
            exit 1
          fi

  test:
    name: Smoke test
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/cache@v4
        with:
          path: .lake/packages
          key: lake-pkgs-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('lean-toolchain') }}-${{ hashFiles('interpreter/lake-manifest.json') }}
          restore-keys: |
            lake-pkgs-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('lean-toolchain') }}-
      - uses: actions/cache/restore@v4
        with:
          path: |
            interpreter/.lake/build
            codelib/.lake/build
            programs/lean/.lake/build
          key: lake-build-itoa-${{ runner.os }}-${{ hashFiles('lean-toolchain') }}-${{ github.sha }}
      - uses: leanprover/lean-action@v1
        with:
          lake-package-directory: interpreter
          build-args: runner
          use-mathlib-cache: true
      - name: Install just
        uses: taiki-e/install-action@just
      - name: Runner smoke test
        run: just runner-smoke
