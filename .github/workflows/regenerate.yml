name: Regenerate Program.lean
on: workflow_dispatch
permissions:
  contents: write
jobs:
  regenerate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: float-programs-clean
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: leanprover/lean-action@v1
        with:
          lake-package-directory: verifier
          build-args: verifier
          use-mathlib-cache: false
      - name: Install pinned Rust toolchain
        working-directory: programs/rust
        run: rustup show active-toolchain || rustup toolchain install
      - name: Install wasm-tools
        uses: taiki-e/install-action@v2
        with:
          tool: wasm-tools
      - name: Regenerate
        working-directory: programs
        run: lake -d ../verifier exe verifier check --no-prove
      - name: Commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add programs/
          git diff --staged --quiet || git commit -m "regenerate Program.lean (canonical Linux build)"
          git push
